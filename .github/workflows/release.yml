name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  # Future-proof: opt into Node 24 for JS actions before GH forces it (2026-06-02 default, 2026-09-16 hard cutoff)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint:ci

      - name: Type check
        run: pnpm run types

      - name: Test
        run: pnpm run test

      - name: Knip
        run: pnpm run knip

      # Runs semantic-release. Conventional Commits → version bump:
      #   feat:                                            → minor
      #   fix: / perf: / revert: / refactor:               → patch
      #   BREAKING CHANGE: footer (or `!` after type)      → major
      #   docs: / chore: / ci: / style: / test: / build:   → no release
      # Full rule set in .releaserc.json (commit-analyzer plugin).
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
